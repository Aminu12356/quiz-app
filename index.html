<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz App</title>
  </head>
  <body>
    <div>
      <!-- Welcome screen -->
      <div>
        <h1>Quiz<span>Quest</span></h1>
        <p>Challenge yourself and test your knowledge!</p>
        <button>Start Quiz</button>
      </div>

      <!-- Quiz screen -->
      <div>
        <div><span>Question 1 of 5</span> <span>Time: 15s</span></div>
        <div>
          <h2>Loading Question</h2>
          <!-- Dynamically rendered button -->
          <button>Next Question</button>
        </div>
 

      </div>

       <!-- Results screen -->
        <div>
          <h2>Quiz Results</h2>
          <p>You scored 0 out of 5</p>

          <p>Good effort, keep learning!</p>
        </div>
    </div>
  </body>
</html>
